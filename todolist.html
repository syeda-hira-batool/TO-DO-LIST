<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="todolist.css">
</head>

<body>
    <div class="container">

       
        <img src="images/bunny.jpg" alt="" class="sticker sticker-bunny">
        <img src="images/star.jpg"  alt="" class="sticker sticker-star">
        <img src="images/tulip.jpg" alt="" class="sticker sticker-tulip">

        
        <div class="app-wrapper">
            <img src="images/safety.jpg" alt="" class="sticker-safety">

            <div class="do-to-list-app">
                <h2>To-Do List <img src="images/icon.png"></h2>
                <div class="row">
                    <input type="text" id="input-box" placeholder="Add your task">
                    <button onclick="addTask()">ADD</button>
                </div>
                <ul id="list-container"></ul>
            </div>

        </div>

    </div>
    <script src="todolist.js"></script>
</body>

</html>
